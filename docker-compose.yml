version: "3.9"
services:
   postgres:
      image: postgres:16
      container_name: canvas
      restart: always
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: canvas
      ports:
         - "5432:5432"
      volumes:
         - type: volume
           source: canvas-data
           target: /var/lib/postgresql/data

volumes:
   canvas-data:
      external: false
      name: canvas-data